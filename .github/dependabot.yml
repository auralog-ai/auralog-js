version: 2
updates:
  # npm deps for the SDK itself
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    commit-message:
      prefix: "build"
      include: scope
    labels:
      - dependencies
    groups:
      # Group all patch + minor updates together to reduce PR noise.
      # Majors get their own PR so they can be reviewed individually.
      dev-minor:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor:
        dependency-type: production
        update-types:
          - minor
          - patch

  # GitHub Actions in .github/workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "build"
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
